name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Create docs folder with sample file
        run: |
          mkdir -p docs
          echo "This is a sample document for testing purposes." > docs/sample.txt

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          API_KEY: test
          MODEL_NAME: gpt-4o-mini
          DOCS_PATH: ./docs
          INDEX_PATH: ./faiss_index/index.faiss
          META_PATH: ./faiss_index/index.pkl
          RATE_LIMIT_RPM: 60
        run: |
          pytest tests/ -v --tb=short